<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureLife Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        h1 { color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Form Styles */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { display: flex; gap: 10px; align-items: center; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; flex: 1; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }

        /* Table Styles */
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .btn { padding: 5px 10px; text-decoration: none; color: white; border-radius: 4px; font-size: 0.9rem; }
        .btn-chat { background-color: #28a745; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 0.8rem; color: white; }
        .status-new { background: #6c757d; }
        .status-interested { background: #17a2b8; }
        .status-converted { background: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Dashboard</h1>

        <!-- Add Lead Form -->
        <div class="card">
            <h3>Add New Lead</h3>
            <form id="add-lead-form" class="form-group">
                <input type="text" id="lead-name" placeholder="Name (e.g. Sarah)" required>
                <input type="text" id="lead-phone" placeholder="Phone (e.g. 555-0199)" required>
                <button type="submit" class="btn-primary">Add Lead</button>
            </form>
        </div>

        <!-- Leads Table -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Intent</th>
                    <th>Status</th>
                    <th>Plan</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="leads-table">
                <!-- Data will load here -->
            </tbody>
        </table>
    </div>
    <script src="/static/dashboard.js"></script
</body>
</html>
