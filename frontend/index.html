<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureLife AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-glow: #38bdf8;
            --secondary-glow: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --msg-bot: #334155;
            --msg-user: linear-gradient(135deg, #0ea5e9, #2563eb);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            /* Abstract animated gradient background */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(129, 140, 248, 0.15) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Main Glass Container */
        .glass-container {
            width: 1000px;
            height: 650px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Left Panel: AI Visuals */
        .ai-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--glass-border);
            position: relative;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--primary-glow);
            margin-bottom: auto; /* Push to top */
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar-container {
            position: relative;
            margin-bottom: 30px;
        }

        /* Glowing Rings Animation */
        .ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 2px solid var(--primary-glow);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            opacity: 0;
        }

        .ring-1 { animation: pulse-ring 3s infinite; }
        .ring-2 { animation: pulse-ring 3s infinite 1s; }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .core {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
            position: relative;
            z-index: 2;
        }

        .core-icon {
            width: 60px; height: 60px;
            fill: white;
        }

        /* Status Display */
        #status {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            min-height: 24px;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* Action Button */
        #start-btn {
            background: var(--text-main);
            color: var(--bg-dark);
            border: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
        }

        #start-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Right Panel: Transcript */
        .chat-panel {
            flex: 1.5;
            background: rgba(15, 23, 42, 0.4);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-dot {
            width: 8px; height: 8px;
            background: var(--primary-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
            display: none; /* Hidden by default */
        }

        #chat-box {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            /* Scrollbar Styling */
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        /* Message Bubbles */
        .msg {
            max-width: 85%;
            padding: 14px 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeRight 0.3s ease-out forwards;
        }

        @keyframes fadeRight {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .bot {
            align-self: flex-start;
            background: var(--msg-bot);
            color: var(--text-main);
            border-radius: 16px 16px 16px 2px;
            border: 1px solid var(--glass-border);
        }

        .user {
            align-self: flex-end;
            background: var(--msg-user);
            color: white;
            border-radius: 16px 16px 2px 16px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

    </style>
</head>
<body>

    <div class="glass-container">
        <!-- Left: AI Interface -->
        <div class="ai-panel">
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/>
                </svg>
                SecureLife
            </div>

            <div class="avatar-container">
                <!-- Pulsing Rings -->
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <!-- Central Core -->
                <div class="core">
                    <svg class="core-icon" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </div>
            </div>

            <!-- JS Target: Status -->
            <div id="status">Status: Idle</div>

            <!-- JS Target: Button -->
            <button id="start-btn">
                Start Conversation
            </button>
        </div>

        <!-- Right: Transcript -->
        <div class="chat-panel">
            <div class="chat-header">
                <span>Conversation Log</span>
                <span>SecureLive v1.0</span>
            </div>
            <!-- JS Target: Chat Box -->
            <div id="chat-box"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
